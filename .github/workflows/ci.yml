name: ci

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ClientApp/package-lock.json

      - name: Install frontend dependencies
        working-directory: ClientApp
        run: npm ci

      - name: Type-check frontend
        working-directory: ClientApp
        run: npm run typecheck

      - name: Build backend and bundled frontend
        run: dotnet build SmartHomeManager.csproj -c Release

      - name: Run backend tests
        run: dotnet test tests/SmartHomeManager.Tests/SmartHomeManager.Tests.csproj -c Release --no-restore -p:SkipFrontendBuild=true
